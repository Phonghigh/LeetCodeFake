spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/leetcode_fake}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
      # Enables or disables flyway migration execution on startup
      enabled: true
      # Locations of migration scripts (default is classpath:db/migration)
      locations: classpath:db/migration